name: Daily Update

on:
  schedule:
    - cron: '0 22 * * 0-4'  # UTC 22:00 周日-周四 = 北京时间 06:00 周一-周五（美股收盘后1-2小时）
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python scripts/run_daily.py
      - run: python scripts/fetch_watchlist.py
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/results/ data/watchlist/
          git diff --staged --quiet || git commit -m "data: daily update $(date +%Y-%m-%d)"
          git push
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd web && npm install && npm run build
      - run: cp -r data web/dist/data
      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/dist

  retry-1:
    needs: update
    if: failure() && github.event.schedule != ''
    runs-on: ubuntu-latest
    steps:
      - run: echo "首次失败，30 分钟后重试..." && sleep 1800
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python scripts/run_daily.py
      - run: python scripts/fetch_watchlist.py
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/results/ data/watchlist/
          git diff --staged --quiet || git commit -m "data: daily retry-1 $(date +%Y-%m-%d)"
          git push
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd web && npm install && npm run build
      - run: cp -r data web/dist/data
      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/dist

  retry-2:
    needs: retry-1
    if: failure() && github.event.schedule != ''
    runs-on: ubuntu-latest
    steps:
      - run: echo "二次失败，30 分钟后再次重试..." && sleep 1800
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python scripts/run_daily.py
      - run: python scripts/fetch_watchlist.py
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/results/ data/watchlist/
          git diff --staged --quiet || git commit -m "data: daily retry-2 $(date +%Y-%m-%d)"
          git push
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd web && npm install && npm run build
      - run: cp -r data web/dist/data
      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/dist
